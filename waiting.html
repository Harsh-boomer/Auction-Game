<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>IPL Auction Waiting Room</title>
<!-- Tailwind CSS v3 CDN -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style data-purpose="custom-scrollbar">
    /* Custom scrollbar for better matching the dark theme */
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #121212;
    }
    ::-webkit-scrollbar-thumb {
      background: #333;
      border-radius: 10px;
    }
  </style>
<style data-purpose="team-colors">
    /* Specific team brand colors for the circles */
    .team-mi { background-color: #004ba0; }
    .team-csk { background-color: #ffff00; color: #000; }
    .team-rcb { background-color: #ec1c24; }
    .team-kkr { background-color: #3a225d; }
    .team-dc { background-color: #00008b; }
    .team-pbks { background-color: #ed1b24; }
    .team-rr { background-color: #ea1b85; }
    .team-srh { background-color: #f26522; }
    .team-gt { background-color: #0b4973; }
    .team-lsg { background-color: #e63329; }
    
    .team-card-active {
      border: 1px solid #fbbf24;
      background-color: rgba(251, 191, 36, 0.05);
    }
  </style>
</head>
<body class="bg-[#0a0a0a] text-white font-sans min-h-screen">
<!-- BEGIN: NavigationHeader -->
<header class="flex items-center justify-between px-6 py-3 bg-[#0f0f0f] border-b border-gray-800 sticky top-0 z-50">
<div class="flex items-center gap-4">
<button class="p-2 hover:bg-gray-800 rounded-full transition-colors" data-purpose="back-button">
<svg class="h-6 w-6" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M10 19l-7-7m0 0l7-7m-7 7h18" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</button>
</div>
<div class="flex items-center gap-2">
<span class="text-gray-400 font-medium">Room:</span>
<span class="text-yellow-500 font-bold tracking-wider">W6XZ9Q</span>
</div>
<div class="flex items-center gap-4">
<button class="bg-[#f29100] text-black font-bold px-6 py-1.5 rounded flex items-center gap-2 hover:bg-yellow-500 transition-colors">
<svg class="h-4 w-4" fill="currentColor" viewbox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
<path clip-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" fill-rule="evenodd"></path>
</svg>
        Start
      </button>
<div class="flex items-center text-green-500" title="Connected">
<svg class="h-5 w-5" fill="currentColor" viewbox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
<path d="M2 11a1 1 0 011-1h2a1 1 0 011 1v5a1 1 0 01-1 1H3a1 1 0 01-1-1v-5zM8 7a1 1 0 011-1h2a1 1 0 011 1v9a1 1 0 01-1 1H9a1 1 0 01-1-1V7zM14 4a1 1 0 011-1h2a1 1 0 011 1v12a1 1 0 01-1 1h-2a1 1 0 01-1-1V4z"></path>
</svg>
</div>
</div>
</header>
<!-- END: NavigationHeader -->
<!-- BEGIN: MainContent -->
<main class="max-w-4xl mx-auto px-4 py-8 space-y-6">
<!-- BEGIN: InviteFriendsSection -->
<section class="bg-[#1a1a1a] p-4 rounded-xl border border-gray-800" data-purpose="invite-friends">
<div class="flex items-center gap-2 mb-3">
<svg class="h-5 w-5 text-yellow-500" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
<h2 class="text-sm font-semibold text-gray-200">Invite Friends</h2>
</div>
<div class="flex flex-wrap gap-2">
<div class="flex-grow min-w-[200px] flex items-center bg-black border border-gray-700 rounded overflow-hidden">
<input class="bg-transparent border-none text-gray-400 text-sm px-3 py-2 w-full focus:ring-0" readonly="" type="text" value="https://www.playauctiongame.com/room/W6XZ9Q"/>
<button class="px-3 py-2 bg-gray-800 hover:bg-gray-700 border-l border-gray-700 text-gray-300" title="Copy Link">
<svg class="h-5 w-5" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</button>
</div>
<button class="bg-green-600 hover:bg-green-700 text-white p-2 rounded transition-colors" title="Share on WhatsApp">
<svg class="h-6 w-6" fill="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"></path>
</svg>
</button>
<button class="bg-[#f29100] hover:bg-yellow-600 text-black font-bold px-4 py-2 rounded flex items-center gap-2 transition-colors">
<svg class="h-5 w-5" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
          Share
        </button>
</div>
</section>
<!-- END: InviteFriendsSection -->
<!-- BEGIN: TeamSelectionSection -->
<section class="bg-[#1a1a1a] p-4 rounded-xl border border-gray-800" data-purpose="team-selection">
<div class="flex items-center justify-between mb-4">
<div class="flex items-center gap-2">
<svg class="h-5 w-5 text-yellow-500" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
<h2 class="text-sm font-semibold text-gray-200">Select Your Team</h2>
</div>
<div class="flex items-center gap-1.5 text-xs bg-black px-2 py-1 rounded">
<div class="w-3 h-3 team-mi rounded-sm"></div>
<span class="text-gray-400">Mumbai</span>
</div>
</div>
<!-- Grid of Teams -->
<div class="grid grid-cols-5 gap-3 md:gap-4">
<!-- MI Selected -->
<div class="team-card-active rounded-lg flex flex-col items-center justify-center p-3 cursor-pointer">
<div class="team-mi w-10 h-10 rounded-full flex items-center justify-center text-[10px] font-bold">MI</div>
<span class="text-[8px] text-gray-400 mt-2">H</span>
</div>
<!-- CSK -->
<div class="bg-[#242424] hover:bg-[#2a2a2a] rounded-lg flex flex-col items-center justify-center p-3 cursor-pointer transition-colors">
<div class="team-csk w-10 h-10 rounded-full flex items-center justify-center text-[10px] font-bold">CSK</div>
</div>
<!-- RCB -->
<div class="bg-[#242424] hover:bg-[#2a2a2a] rounded-lg flex flex-col items-center justify-center p-3 cursor-pointer transition-colors">
<div class="team-rcb w-10 h-10 rounded-full flex items-center justify-center text-[10px] font-bold text-white">RCB</div>
</div>
<!-- KKR -->
<div class="bg-[#242424] hover:bg-[#2a2a2a] rounded-lg flex flex-col items-center justify-center p-3 cursor-pointer transition-colors">
<div class="team-kkr w-10 h-10 rounded-full flex items-center justify-center text-[10px] font-bold text-white">KKR</div>
</div>
<!-- DC -->
<div class="bg-[#242424] hover:bg-[#2a2a2a] rounded-lg flex flex-col items-center justify-center p-3 cursor-pointer transition-colors">
<div class="team-dc w-10 h-10 rounded-full flex items-center justify-center text-[10px] font-bold text-white">DC</div>
</div>
<!-- PBKS -->
<div class="bg-[#242424] hover:bg-[#2a2a2a] rounded-lg flex flex-col items-center justify-center p-3 cursor-pointer transition-colors">
<div class="team-pbks w-10 h-10 rounded-full flex items-center justify-center text-[10px] font-bold text-white">PBKS</div>
</div>
<!-- RR -->
<div class="bg-[#242424] hover:bg-[#2a2a2a] rounded-lg flex flex-col items-center justify-center p-3 cursor-pointer transition-colors">
<div class="team-rr w-10 h-10 rounded-full flex items-center justify-center text-[10px] font-bold text-white">RR</div>
</div>
<!-- SRH -->
<div class="bg-[#242424] hover:bg-[#2a2a2a] rounded-lg flex flex-col items-center justify-center p-3 cursor-pointer transition-colors">
<div class="team-srh w-10 h-10 rounded-full flex items-center justify-center text-[10px] font-bold text-white">SRH</div>
</div>
<!-- GT -->
<div class="bg-[#242424] hover:bg-[#2a2a2a] rounded-lg flex flex-col items-center justify-center p-3 cursor-pointer transition-colors">
<div class="team-gt w-10 h-10 rounded-full flex items-center justify-center text-[10px] font-bold text-white">GT</div>
</div>
<!-- LSG -->
<div class="bg-[#242424] hover:bg-[#2a2a2a] rounded-lg flex flex-col items-center justify-center p-3 cursor-pointer transition-colors">
<div class="team-lsg w-10 h-10 rounded-full flex items-center justify-center text-[10px] font-bold text-white">LSG</div>
</div>
</div>
</section>
<!-- END: TeamSelectionSection -->
<!-- BEGIN: BannerSection -->
<section class="bg-[#2d123b] border border-[#5d2d7a] rounded-lg p-3 flex items-center justify-between cursor-pointer hover:bg-[#3d1a51] transition-colors" data-purpose="promo-banner">
<div class="flex items-center gap-4">
<div class="bg-[#5d2d7a] p-2 rounded-lg">
<svg class="h-6 w-6 text-purple-200" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M13 10V3L4 14h7v7l9-11h-7z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
<div>
<div class="flex items-center gap-2">
<h3 class="font-bold text-sm">Play IPL Simulation Game!</h3>
<span class="bg-green-600 text-[10px] px-1.5 rounded font-bold">LIVE</span>
</div>
<p class="text-xs text-purple-300">24/7 cricket simulation • Play now at cricketdirector.com</p>
</div>
</div>
<div class="text-purple-400">
<svg class="h-5 w-5" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M13 5l7 7-7 7" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
</section>
<!-- END: BannerSection -->
<!-- BEGIN: TabbedPanel -->
<div class="bg-[#1a1a1a] rounded-xl border border-gray-800 overflow-hidden" data-purpose="user-management">
<!-- Tabs -->
<div class="flex border-b border-gray-800">
<button class="flex-1 py-3 text-sm font-semibold flex items-center justify-center gap-2 bg-[#2d2417] text-[#f29100] border-b-2 border-[#f29100]">
<svg class="h-4 w-4" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">

</svg>

</button>
<button class="flex-1 py-3 text-sm font-semibold flex items-center justify-center gap-2 text-gray-500 hover:text-gray-300">
<svg class="h-4 w-4" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>

<svg class="h-4 w-4" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
<path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
          Settings
        </button>
</div>
<!-- Player List Area -->
<div class="p-2 space-y-1 min-h-[150px]">
<!-- Active User Item -->
<div class="flex items-center justify-between p-3 rounded-lg hover:bg-[#242424] transition-colors cursor-pointer group">
<div class="flex items-center gap-3">
<div class="team-mi w-8 h-8 rounded-full flex items-center justify-center text-[10px] font-bold border border-blue-400">MI</div>
<div>
<div class="flex items-center gap-1">
<span class="font-bold text-sm">H</span>
<svg class="h-3.5 w-3.5 text-yellow-500" fill="currentColor" viewbox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
<path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"></path>
</svg>
</div>
<p class="text-[10px] text-gray-500">Mumbai</p>
</div>
</div>
<div class="flex items-center">
<div class="w-2.5 h-2.5 bg-green-500 rounded-full shadow-[0_0_8px_rgba(34,197,94,0.6)]"></div>
</div>
</div>
</div>
</div>
<!-- END: TabbedPanel -->
</main>
<!-- END: MainContent -->
</body></html>
